<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200">
  <rect width="700" height="200" fill="#F8F6F2"/>

  <!-- Panel backgrounds -->
  <rect x="4"   y="10" width="90" height="140" rx="4" fill="#ffffff" stroke="#D1D5DB" stroke-width="0.8"/>
  <rect x="102" y="10" width="90" height="140" rx="4" fill="#ffffff" stroke="#D1D5DB" stroke-width="0.8"/>
  <rect x="200" y="10" width="90" height="140" rx="4" fill="#ffffff" stroke="#D1D5DB" stroke-width="0.8"/>
  <rect x="298" y="10" width="90" height="140" rx="4" fill="#ffffff" stroke="#D1D5DB" stroke-width="0.8"/>
  <rect x="396" y="10" width="90" height="140" rx="4" fill="#ffffff" stroke="#D1D5DB" stroke-width="0.8"/>
  <rect x="494" y="10" width="90" height="140" rx="4" fill="#ffffff" stroke="#D1D5DB" stroke-width="0.8"/>
  <rect x="592" y="10" width="104" height="140" rx="4" fill="#ffffff" stroke="#D1D5DB" stroke-width="0.8"/>

  <!-- Plot outline: 60x90 rectangle centred in each panel -->
  <!-- Dot density decreases left to right (0% control = dense weeds, 100% = bare/clean) -->

  <!-- Panel 1: 0% control — 36 dots (very dense) -->
  <rect x="19" y="22" width="60" height="90" rx="2" fill="#F8F6F2" stroke="#2D5A40" stroke-width="1.2"/>
  <circle cx="29" cy="32" r="2.5" fill="#6B7280"/><circle cx="39" cy="32" r="2.5" fill="#6B7280"/>
  <circle cx="49" cy="32" r="2.5" fill="#6B7280"/><circle cx="59" cy="32" r="2.5" fill="#6B7280"/>
  <circle cx="69" cy="32" r="2.5" fill="#6B7280"/>
  <circle cx="29" cy="43" r="2.5" fill="#6B7280"/><circle cx="39" cy="43" r="2.5" fill="#6B7280"/>
  <circle cx="49" cy="43" r="2.5" fill="#6B7280"/><circle cx="59" cy="43" r="2.5" fill="#6B7280"/>
  <circle cx="69" cy="43" r="2.5" fill="#6B7280"/>
  <circle cx="29" cy="54" r="2.5" fill="#6B7280"/><circle cx="39" cy="54" r="2.5" fill="#6B7280"/>
  <circle cx="49" cy="54" r="2.5" fill="#6B7280"/><circle cx="59" cy="54" r="2.5" fill="#6B7280"/>
  <circle cx="69" cy="54" r="2.5" fill="#6B7280"/>
  <circle cx="29" cy="65" r="2.5" fill="#6B7280"/><circle cx="39" cy="65" r="2.5" fill="#6B7280"/>
  <circle cx="49" cy="65" r="2.5" fill="#6B7280"/><circle cx="59" cy="65" r="2.5" fill="#6B7280"/>
  <circle cx="69" cy="65" r="2.5" fill="#6B7280"/>
  <circle cx="29" cy="76" r="2.5" fill="#6B7280"/><circle cx="39" cy="76" r="2.5" fill="#6B7280"/>
  <circle cx="49" cy="76" r="2.5" fill="#6B7280"/><circle cx="59" cy="76" r="2.5" fill="#6B7280"/>
  <circle cx="69" cy="76" r="2.5" fill="#6B7280"/>
  <circle cx="29" cy="87" r="2.5" fill="#6B7280"/><circle cx="39" cy="87" r="2.5" fill="#6B7280"/>
  <circle cx="49" cy="87" r="2.5" fill="#6B7280"/><circle cx="59" cy="87" r="2.5" fill="#6B7280"/>
  <circle cx="69" cy="87" r="2.5" fill="#6B7280"/>
  <circle cx="29" cy="98" r="2.5" fill="#6B7280"/><circle cx="39" cy="98" r="2.5" fill="#6B7280"/>
  <circle cx="49" cy="98" r="2.5" fill="#6B7280"/><circle cx="59" cy="98" r="2.5" fill="#6B7280"/>
  <circle cx="69" cy="98" r="2.5" fill="#6B7280"/>

  <!-- Panel 2: 10% control — 32 dots -->
  <rect x="117" y="22" width="60" height="90" rx="2" fill="#F8F6F2" stroke="#2D5A40" stroke-width="1.2"/>
  <circle cx="127" cy="32" r="2.5" fill="#6B7280"/><circle cx="137" cy="32" r="2.5" fill="#6B7280"/>
  <circle cx="147" cy="32" r="2.5" fill="#6B7280"/><circle cx="157" cy="32" r="2.5" fill="#6B7280"/>
  <circle cx="167" cy="32" r="2.5" fill="#6B7280"/>
  <circle cx="127" cy="43" r="2.5" fill="#6B7280"/><circle cx="137" cy="43" r="2.5" fill="#6B7280"/>
  <circle cx="147" cy="43" r="2.5" fill="#6B7280"/><circle cx="157" cy="43" r="2.5" fill="#6B7280"/>
  <circle cx="167" cy="43" r="2.5" fill="#6B7280"/>
  <circle cx="127" cy="54" r="2.5" fill="#6B7280"/><circle cx="137" cy="54" r="2.5" fill="#6B7280"/>
  <circle cx="147" cy="54" r="2.5" fill="#6B7280"/><circle cx="157" cy="54" r="2.5" fill="#6B7280"/>
  <circle cx="127" cy="65" r="2.5" fill="#6B7280"/><circle cx="137" cy="65" r="2.5" fill="#6B7280"/>
  <circle cx="147" cy="65" r="2.5" fill="#6B7280"/><circle cx="157" cy="65" r="2.5" fill="#6B7280"/>
  <circle cx="127" cy="76" r="2.5" fill="#6B7280"/><circle cx="137" cy="76" r="2.5" fill="#6B7280"/>
  <circle cx="147" cy="76" r="2.5" fill="#6B7280"/>
  <circle cx="127" cy="87" r="2.5" fill="#6B7280"/><circle cx="137" cy="87" r="2.5" fill="#6B7280"/>
  <circle cx="147" cy="87" r="2.5" fill="#6B7280"/>
  <circle cx="127" cy="98" r="2.5" fill="#6B7280"/><circle cx="137" cy="98" r="2.5" fill="#6B7280"/>
  <circle cx="147" cy="98" r="2.5" fill="#6B7280"/>

  <!-- Panel 3: 25% control — 20 dots -->
  <rect x="215" y="22" width="60" height="90" rx="2" fill="#F8F6F2" stroke="#2D5A40" stroke-width="1.2"/>
  <circle cx="225" cy="32" r="2.5" fill="#6B7280"/><circle cx="240" cy="32" r="2.5" fill="#6B7280"/>
  <circle cx="255" cy="32" r="2.5" fill="#6B7280"/><circle cx="265" cy="32" r="2.5" fill="#6B7280"/>
  <circle cx="225" cy="47" r="2.5" fill="#6B7280"/><circle cx="245" cy="47" r="2.5" fill="#6B7280"/>
  <circle cx="265" cy="47" r="2.5" fill="#6B7280"/>
  <circle cx="230" cy="62" r="2.5" fill="#6B7280"/><circle cx="250" cy="62" r="2.5" fill="#6B7280"/>
  <circle cx="265" cy="62" r="2.5" fill="#6B7280"/>
  <circle cx="225" cy="77" r="2.5" fill="#6B7280"/><circle cx="245" cy="77" r="2.5" fill="#6B7280"/>
  <circle cx="228" cy="90" r="2.5" fill="#6B7280"/><circle cx="248" cy="90" r="2.5" fill="#6B7280"/>
  <circle cx="260" cy="90" r="2.5" fill="#6B7280"/>
  <circle cx="225" cy="103" r="2.5" fill="#6B7280"/>

  <!-- Panel 4: 50% control — 10 dots -->
  <rect x="313" y="22" width="60" height="90" rx="2" fill="#F8F6F2" stroke="#2D5A40" stroke-width="1.2"/>
  <circle cx="323" cy="35" r="2.5" fill="#6B7280"/><circle cx="343" cy="35" r="2.5" fill="#6B7280"/>
  <circle cx="333" cy="52" r="2.5" fill="#6B7280"/><circle cx="353" cy="52" r="2.5" fill="#6B7280"/>
  <circle cx="323" cy="69" r="2.5" fill="#6B7280"/><circle cx="348" cy="69" r="2.5" fill="#6B7280"/>
  <circle cx="333" cy="85" r="2.5" fill="#6B7280"/>
  <circle cx="323" cy="100" r="2.5" fill="#6B7280"/><circle cx="348" cy="100" r="2.5" fill="#6B7280"/>

  <!-- Panel 5: 75% control — 4 dots -->
  <rect x="411" y="22" width="60" height="90" rx="2" fill="#F8F6F2" stroke="#2D5A40" stroke-width="1.2"/>
  <circle cx="425" cy="40" r="2.5" fill="#6B7280"/><circle cx="455" cy="62" r="2.5" fill="#6B7280"/>
  <circle cx="430" cy="85" r="2.5" fill="#6B7280"/><circle cx="455" cy="100" r="2.5" fill="#6B7280"/>

  <!-- Panel 6: 90% control — 1 dot -->
  <rect x="509" y="22" width="60" height="90" rx="2" fill="#F8F6F2" stroke="#2D5A40" stroke-width="1.2"/>
  <circle cx="539" cy="67" r="2.5" fill="#6B7280"/>

  <!-- Panel 7: 100% control — empty plot -->
  <rect x="607" y="22" width="80" height="90" rx="2" fill="#F8F6F2" stroke="#2D5A40" stroke-width="1.2"/>

  <!-- Labels -->
  <text x="49"  y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#111827" font-weight="600">0%</text>
  <text x="147" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#111827" font-weight="600">10%</text>
  <text x="245" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#111827" font-weight="600">25%</text>
  <text x="343" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#111827" font-weight="600">50%</text>
  <text x="441" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#111827" font-weight="600">75%</text>
  <text x="539" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#111827" font-weight="600">90%</text>
  <text x="647" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#111827" font-weight="600">100%</text>

  <!-- Caption -->
  <text x="350" y="184" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280" font-weight="600">Weed Control %</text>
  <text x="350" y="197" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9CA3AF">Scale based on EPPO PP1/152 guidelines</text>
</svg>
