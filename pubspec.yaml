name: arm_field_companion
description: Agnexis — professional field trial data collection and execution platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  sqlite3: ^2.4.5
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  csv: ^6.0.0
  excel: ^4.0.6
  xml: ^6.5.0
  archive: ^3.4.10
  pdf: ^3.11.0
  share_plus: ^10.0.0
  file_picker: ^11.0.2
  image_picker: ^1.2.1
  image: ^4.3.0
  connectivity_plus: ^6.1.4
  http: ^1.2.0
  fl_chart: ^0.69.0
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  crypto: ^3.0.7
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.2.2
  wakelock_plus: ^1.2.8
  geolocator: ^12.0.0
  pointycastle: ^3.7.3
  flutter_secure_storage: ^9.2.2
  package_info_plus: ^9.0.0
  device_info_plus: ^12.4.0
  google_sign_in: ^6.2.2
  msal_auth: ^3.3.0
  sentry_flutter: ^8.14.2
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

  path_provider_platform_interface: any
flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/Branding/
    - assets/images/trials/
    - assets/reference_guides/lane1/
    - assets/reference_guides/lane2a/approved/wild_oat/
    - assets/reference_guides/lane2a/approved/canada_thistle/
    - assets/reference_guides/lane2a/approved/wild_buckwheat/
    - assets/reference_guides/lane2a/approved/volunteer_canola/
    - assets/reference_guides/lane2a/approved/dandelion/
    - assets/msal_config.json

# Native splash: solid green, no image — seamless transition into Dart splash.
flutter_native_splash:
  color: "#163B28"
  android: true
  ios: true

# Launcher icons: 1024×1024 masters built from splash_logo.png (see tool/splash_to_app_icon.dart).
# Inset 3 for adaptive safe zone.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Branding/app_icon.png"
  image_path_ios: "assets/Branding/app_icon_ios.png"
  min_sdk_android: 21
  adaptive_icon_background: "#163B28"
  adaptive_icon_foreground: "assets/Branding/app_icon.png"
  adaptive_icon_foreground_inset: 3
